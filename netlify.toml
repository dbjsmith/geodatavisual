[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "vite"

# SPA fallback — all non-asset routes serve index.html
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Required for iframe-embedding inside BlueBox host
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
